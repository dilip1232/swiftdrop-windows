<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SwiftDrop</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e7ebf0;
    --muted: #8b93a3;
    --accent: #4f8cff;
    --accent-2: #7a5cff;
    --ok: #34d399;
    --err: #f87171;
    --radius: 15px;
    --shadow: 0 6px 20px rgba(0,0,0,.28);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f3f5f9; --panel: #ffffff; --panel-2: #f7f9fc;
      --border: #e3e8f0; --text: #11151c; --muted: #66707f;
      --shadow: 0 6px 18px rgba(20,30,60,.10);
    }
  }
  * { box-sizing: border-box; }
  html { margin: 0; height: 100%; clip-path: inset(0 round 12px); background: var(--bg); }
  body {
    margin: 0; height: 100%;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); overflow: hidden; background: var(--bg);
  }
  .wrap {
    height: 100%; display: flex; flex-direction: column;
    padding: 12px; overflow: hidden;
  }

  header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex: none; }
  .logo {
    width: 26px; height: 26px; border-radius: 7px; flex: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-size: 13px;
  }
  header h1 { font-size: 14px; margin: 0; letter-spacing: .2px; }
  .quit { margin-left: auto; flex: none; padding: 4px 10px; font-size: 11px; }
  header .me { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 4px; vertical-align: middle; }
  .dot.live { background: var(--ok); box-shadow: 0 0 0 3px rgba(70,211,154,.18); }

  .content { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; padding-right: 2px; }

  .stitle {
    font-size: 10px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--muted); margin: 0 0 6px 2px; font-weight: 600;
  }

  /* Drop zone */
  .drop {
    display: block; padding: 14px 10px; text-align: center; margin-bottom: 8px;
    border: 1.5px dashed var(--border); border-radius: 10px;
    background: var(--panel); cursor: pointer; transition: .18s;
  }
  .drop:hover { border-color: var(--accent); }
  .drop.over { border-color: var(--accent); background: rgba(91,141,239,.10); }
  .drop .big { font-size: 18px; }
  .drop p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }
  .drop b { color: var(--text); }

  /* Queue / transfers */
  .queue { margin-bottom: 8px; }
  .file {
    display: flex; align-items: center; gap: 9px; padding: 7px 0;
    border-top: 1px solid var(--border);
  }
  .file:first-child { border-top: none; }
  .file .meta { flex: 1; min-width: 0; }
  .file .name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
  .ficon { flex-shrink: 0; }
  .file .sub { font-size: 10px; color: var(--muted); }
  .bar { height: 5px; border-radius: 5px; background: var(--border); overflow: hidden; margin-top: 5px; }
  .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .12s; }
  .file .pct { font-variant-numeric: tabular-nums; font-size: 11.5px; color: var(--muted); width: 50px; text-align: right; }
  .file.done .pct { color: var(--ok); }
  .file.err .pct { color: var(--err); }
  .file .cancel { color: var(--muted); font-size: 17px; line-height: 1; padding: 2px 6px; cursor: pointer; }
  .file .cancel:hover { color: var(--err); }
  .file .retry { color: var(--accent); font-size: 10px; font-weight: 600; padding: 2px 7px; border: 1px solid var(--accent); border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .file .retry:hover { background: var(--accent); color: #fff; }
  .file .pause { color: var(--muted); font-size: 10px; font-weight: 600; padding: 2px 7px; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .file .pause:hover { border-color: var(--muted); color: var(--text); }
  .file .accept { color: var(--ok); font-size: 10px; font-weight: 600; padding: 2px 7px; border: 1px solid var(--ok); border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .file .accept:hover { background: var(--ok); color: #fff; }
  .file .reject { color: var(--err); font-size: 10px; font-weight: 600; padding: 2px 7px; border: 1px solid var(--err); border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .file .reject:hover { background: var(--err); color: #fff; }

  .pair-btn { background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; font-size: 10px; font-weight: 600; padding: 3px 8px; cursor: pointer; color: var(--muted); flex: none; line-height: 1.3; transition: .12s; white-space: nowrap; }
  .pair-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pair-btn.paired { color: var(--ok); border-color: var(--ok); }
  .pair-btn.paired:hover { color: var(--err); border-color: var(--err); }

  .sendbar { display: flex; gap: 7px; margin-bottom: 10px; }
  button {
    font: inherit; font-size: 12px; font-weight: 600; border: none; cursor: pointer;
    border-radius: 9px; padding: 8px 12px; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    transition: .15s; flex: 1;
  }
  button:hover:not(:disabled) { filter: brightness(1.07); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); flex: none; }

  /* Devices */
  .devices { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .device {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px;
    border-radius: 9px; cursor: pointer; border: 1px solid var(--border);
    background: var(--panel); transition: .12s;
  }
  .device:hover { border-color: var(--muted); }
  .device.active { background: rgba(91,141,239,.10); border-color: var(--accent); }
  .device .ic { width: 24px; height: 24px; border-radius: 7px; flex: none; display: grid; place-items: center; background: var(--panel-2); font-size: 13px; }
  .device .info { flex: 1; min-width: 0; }
  .device .nm { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .device .pf { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .device .rm { flex: none; color: var(--muted); opacity: .3; font-size: 14px; line-height: 1; padding: 0 2px; cursor: pointer; }
  .device:hover .rm { opacity: .7; }
  .device .rm:hover { color: var(--err); opacity: 1; }
  .empty { padding: 18px 10px; text-align: center; color: var(--muted); font-size: 11.5px; }
  .addrow { display: flex; gap: 5px; margin-bottom: 12px; }
  .addrow input { flex: 1; min-width: 0; font: inherit; font-size: 11px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--text); }
  .addrow input::placeholder { color: var(--muted); }
  .addrow input:focus { outline: none; border-color: var(--accent); }
  .addbtn { flex: none; padding: 6px 10px; font-size: 13px; line-height: 1; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* Subtle, soft scrollbars */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .toast {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%) translateY(16px);
    background: var(--panel);
    border: 1px solid var(--border); color: var(--text);
    padding: 9px 15px; border-radius: 11px; box-shadow: var(--shadow); font-size: 12.5px;
    opacity: 0; pointer-events: none; transition: .25s; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--err); }

  /* Pairing modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; justify-content: center; align-items: center; z-index: 999; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; width: 290px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header h3 { margin: 0; font-size: 15px; }
  .modal-close { cursor: pointer; font-size: 20px; color: var(--muted); padding: 2px 6px; }
  .modal-close:hover { color: var(--err); }
  .pair-option { display: block; width: 100%; margin-bottom: 8px; text-align: center; font-size: 11px; padding: 8px 10px; }
  .pin-display { font-family: monospace; font-size: 26px; font-weight: 700; letter-spacing: 6px; text-align: center; padding: 12px; background: var(--panel-2); border-radius: 10px; color: var(--accent); }
  .pin-input { flex: 1; min-width: 0; font-family: monospace; font-size: 18px; letter-spacing: 5px; text-align: center; padding: 8px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--panel-2); color: var(--text); outline: none; }
  .pin-input:focus { border-color: var(--accent); }
  .pair-submit { flex: none; padding: 8px 14px; }
  .file .openfolder { color: var(--muted); font-size: 13px; padding: 2px 5px; cursor: pointer; opacity: .5; text-decoration: none; }
  .file .openfolder:hover { color: var(--accent); opacity: 1; }
</style>
<link rel="stylesheet" href="chat.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">⇅</div>
    <div>
      <h1>SwiftDrop</h1>
      <div class="me"><span class="dot" id="dot"></span><span id="meName">connecting…</span><span id="meIp" style="color:var(--muted)"></span></div>
    </div>
    <button class="ghost quit" id="quitBtn" title="Quit SwiftDrop">Quit</button>
  </header>

  <div class="content">
    <div class="stitle">Devices</div>
    <div class="devices" id="devices">
      <div class="empty"><span class="spin"></span>Looking for devices…</div>
    </div>
    <div class="addrow">
      <input id="hostInput" type="text" inputmode="decimal" placeholder="Add by IP" />
      <button class="ghost addbtn" id="addBtn" title="Add device">＋</button>
    </div>

    <div class="stitle">Send files</div>
    <div class="drop" id="drop">
      <div class="big">📤</div>
      <p><b>Drop files here</b> or click to choose</p>
      <p id="dropHint">Pick a device above first</p>
    </div>
    <div class="queue" id="queue"></div>
    <div class="sendbar">
      <button id="sendBtn" disabled>Send</button>
      <button class="ghost" id="clearBtn">Clear</button>
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-hdr">
        <div class="chat-hdr-left">
          <div class="chat-hdr-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <span class="chat-hdr-name" id="chatName"></span>
        </div>
        <span class="chat-hdr-close" id="chatClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
      </div>
      <div class="chat-msgs" id="chatMsgs">
        <div class="chat-empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No messages yet</div>
      </div>
      <div class="chat-input">
        <textarea id="chatInput" placeholder="Type a message…" rows="1"></textarea>
        <button class="chat-send" id="chatSendBtn" disabled><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Pairing modal -->
<div class="modal-overlay" id="pairModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="pairTitle">Pair Device</h3>
      <span class="modal-close" id="pairClose">×</span>
    </div>
    <div id="pairStep1" class="pair-step">
      <p style="margin:0 0 12px;color:var(--muted);font-size:13px">Choose how to pair with <b id="pairDevName"></b>:</p>
      <button class="pair-option" id="pairGenerate">Generate PIN on this device</button>
      <button class="pair-option ghost" id="pairEnter">I have a PIN from the other device</button>
    </div>
    <div id="pairStep2" class="pair-step" style="display:none">
      <p style="margin:0 0 8px;color:var(--muted);font-size:13px">Share this PIN with the other device:</p>
      <div class="pin-display" id="pinDisplay"></div>
      <p style="margin:8px 0 0;color:var(--muted);font-size:11px">Expires in 60 seconds</p>
    </div>
    <div id="pairStep3" class="pair-step" style="display:none">
      <p style="margin:0 0 10px;color:var(--muted);font-size:13px">Enter the PIN shown on the other device:</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="text" id="pinInput" class="pin-input" maxlength="6" placeholder="000000" autocomplete="off" inputmode="numeric">
        <button id="pinSubmit" class="pair-submit" style="width:100%">Pair</button>
      </div>
      <p id="pairError" style="margin:8px 0 0;color:var(--err);font-size:12px;display:none"></p>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
// staged   = files chosen (with real OS paths) but not yet sent
// transfers = live/recent transfers reported by the Go backend
const state = { me: null, devices: [], target: null, staged: [], transfers: [], pairedIds: new Set() };
// API token injected by the server; all /api/* calls include it.
let apiToken = "";
const apiFetch = (url, opts = {}) => {
  opts.headers = { ...opts.headers, "X-API-Token": apiToken };
  return fetch(url, opts);
};

const platformIcon = p => ({ darwin: "🖥️", windows: "🪟", linux: "🐧", android: "📱", ios: "📱" }[p] || "💻");
const fmtSize = n => {
  if (n < 1024) return n + " B";
  const u = ["KB","MB","GB","TB"]; let i = -1;
  do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
  return n.toFixed(1) + " " + u[i];
};

function toast(msg, isErr) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.toggle("err", !!isErr);
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2600);
}

async function loadMe() {
  try {
    if (!apiToken) apiToken = await (await fetch("/api/token")).text();
    state.me = await (await fetch("/api/me")).json();
    $("#meName").textContent = "This device: " + state.me.name;
    $("#meIp").textContent = state.me.ip ? " · " + state.me.ip : "";
    $("#dot").classList.add("live");
  } catch { $("#meName").textContent = "offline"; }
}

let lastDevicesJson = "";
async function pollDevices() {
  try {
    const data = await (await apiFetch("/api/devices")).json();
    const j = JSON.stringify(data);
    if (j === lastDevicesJson) return;   // unchanged → don't rebuild the DOM (no flicker)
    lastDevicesJson = j;
    state.devices = data;
    renderDevices();
  } catch {}                             // transient failure → keep current list
}

function renderDevices() {
  const el = $("#devices");
  if (!state.devices.length) {
    el.innerHTML = '<div class="empty"><span class="spin"></span>Looking for devices…</div>';
    state.target = null;
    updateSendState();
    return;
  }
  if (state.target && !state.devices.some(d => d.id === state.target)) state.target = null;
  el.innerHTML = "";
  for (const d of state.devices) {
    const row = document.createElement("div");
    row.className = "device" + (d.id === state.target ? " active" : "");
    const sub = escapeHtml((d.host || "").replace(/:\d+$/, "") || d.platform || "device");
    const paired = state.pairedIds && state.pairedIds.has(d.id);
    row.innerHTML = `<div class="ic">${platformIcon(d.platform)}</div>
      <div class="info"><div class="nm">${escapeHtml(d.name)}</div><div class="pf">${sub}</div></div>
      ${paired ? '<span class="chat-btn" title="Chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="unread"></span></span>' : ''}
      ${paired ? '<span class="pair-btn paired">Paired</span>' : '<span class="pair-btn">Pair</span>'}
      <span class="rm" title="Remove">×</span>`;
    row.onclick = () => { state.target = d.id; renderDevices(); updateSendState(); };
    const chatBtn = row.querySelector(".chat-btn");
    if (chatBtn) chatBtn.onclick = e => { e.stopPropagation(); openChat(d.id, d.name); };
    const pairBtn = row.querySelector(".pair-btn");
    if (pairBtn) pairBtn.onclick = e => { e.stopPropagation(); paired ? unpairDevice(d.id) : startPairing(d.id, d.name); };
    const rm = row.querySelector(".rm");
    if (rm) rm.onclick = e => { e.stopPropagation(); removePeer(d.id); };
    el.appendChild(row);
  }
  updateSendState();
}

function escapeHtml(s) { return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// Stage files chosen via the native picker or dropped on the window. Each item
// carries the real OS path so Go can stream it directly at full speed.
function stageFiles(infos) {
  if (!infos || !infos.length) return;
  const have = new Set(state.staged.map(f => f.path));
  for (const f of infos) if (!have.has(f.path)) state.staged.push(f);
  renderQueue();
  updateSendState();
}

// window.swiftdropOnDrop is called from Go when files are dropped on the window.
window.swiftdropOnDrop = infos => { stageFiles(infos); $("#drop").classList.remove("over"); };

async function pickFiles() {
  try {
    const res = await apiFetch("/api/pick", { method: "POST" });
    if (res.ok) stageFiles(await res.json());
  } catch {}
}

const rates = {}; // transfer id -> {sent, t} for speed calc

function fileIcon(isFolder) {
  if (isFolder) return '<svg class="ficon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7EB6FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
  return '<svg class="ficon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7EB6FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
}

function fileRow(opts) {
  const { name, size, pct, status, label, sub, cancelId, retryId, showFolder, pendingId, pauseId, resumeId, isFolder } = opts;
  const row = document.createElement("div");
  row.className = "file " + (status || "");
  row.innerHTML = `<div class="meta">
      <div class="name">${fileIcon(isFolder)}${escapeHtml(name)}</div>
      <div class="sub">${sub}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="pct">${label}</div>` +
    (pendingId ? `<div class="accept">Accept</div><div class="reject">Reject</div>` : "") +
    (retryId ? `<div class="retry">Retry</div>` : "") +
    (pauseId ? `<div class="pause">Pause</div>` : "") +
    (resumeId ? `<div class="pause">Resume</div>` : "") +
    (showFolder ? `<span class="openfolder" title="Open folder"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>` : "") +
    (cancelId ? `<div class="cancel" title="Cancel">×</div>` : "");
  if (pendingId) {
    row.querySelector(".accept").onclick = () => respondTransfer(pendingId, true);
    row.querySelector(".reject").onclick = () => respondTransfer(pendingId, false);
  }
  if (retryId) row.querySelector(".retry").onclick = () => retryTransfer(retryId);
  if (pauseId) row.querySelector(".pause").onclick = () => pauseTransfer(pauseId);
  if (resumeId) row.querySelector(".pause").onclick = () => resumeTransfer(resumeId);
  if (cancelId) row.querySelector(".cancel").onclick = () => cancelTransfer(cancelId);
  if (showFolder) row.querySelector(".openfolder").onclick = () => openFolder();
  return row;
}

function openFolder() {
  apiFetch("/api/open-folder", { method: "POST" }).catch(() => {});
}

function renderQueue() {
  const q = $("#queue");
  q.innerHTML = "";
  // Active/recent transfers (live progress from the backend) first.
  for (const t of state.transfers) {
    const pct = t.size > 0 ? Math.round(t.sent / t.size * 100) : (t.status === "done" ? 100 : 0);
    const sending = t.status === "sending";
    const pending = t.status === "pending";
    const preparing = t.status === "preparing";
    const paused = t.status === "paused";
    const active = sending || paused;
    const recv = t.dir === "recv";
    const partial = t.status === "done" && t.err;
    const label = preparing ? "Preparing…"
      : pending ? "Pending"
      : paused ? "Paused"
      : partial ? "Partial"
      : t.status === "done" ? (recv ? "Received" : "Sent")
      : t.status === "error" ? "Failed" : t.status === "canceled" ? "Canceled" : pct + "%";
    let sub = (recv ? "↓ from " : "↑ to ") + escapeHtml(t.peer || "");
    if (preparing) { sub += " · preparing…"; }
    else if (pending) { sub += " · " + fmtSize(t.size) + " · waiting for approval"; }
    else if (active) { sub += " · " + fmtSize(t.sent) + " / " + fmtSize(t.size); }
    else { sub += " · " + fmtSize(t.size); }
    if (sending && t.rate) sub += " · " + fmtSize(t.rate) + "/s";
    if (paused) sub += " · paused";
    if (partial) sub += " · " + t.err;
    const tIsFolder = t.name.startsWith("📁 ");
    const tName = tIsFolder ? t.name.slice(3) : t.name;
    q.appendChild(fileRow({
      name: tName, size: t.size, pct, sub, label, isFolder: tIsFolder,
      status: pending ? "" : t.status === "error" ? "err" : partial ? "" : t.status === "done" ? "done" : t.status === "canceled" ? "err" : "",
      cancelId: (active && !recv) ? t.id : null,
      retryId: t.retryable ? t.id : null,
      showFolder: t.status === "done",
      pendingId: pending ? t.id : null,
      pauseId: (sending && !recv) ? t.id : null,
      resumeId: (paused && !recv) ? t.id : null
    }));
  }
  // Then files staged but not yet sent.
  for (const f of state.staged) q.appendChild(fileRow({ name: f.name, size: f.size, pct: 0, sub: fmtSize(f.size), label: "Ready" }));
}

async function respondTransfer(id, accept) {
  const ep = accept ? "/api/transfers/accept" : "/api/transfers/reject";
  try { await apiFetch(ep + "?id=" + encodeURIComponent(id), { method: "POST" }); pollTransfers(); } catch {}
}

async function cancelTransfer(id) {
  try { await apiFetch("/api/transfers/cancel?id=" + encodeURIComponent(id), { method: "POST" }); pollTransfers(); } catch {}
}

async function pauseTransfer(id) {
  try { await apiFetch("/api/transfers/pause?id=" + encodeURIComponent(id), { method: "POST" }); pollTransfers(); } catch {}
}

async function resumeTransfer(id) {
  try { await apiFetch("/api/transfers/resume?id=" + encodeURIComponent(id), { method: "POST" }); pollTransfers(); } catch {}
}

async function retryTransfer(id) {
  try {
    const res = await apiFetch("/api/transfers/retry?id=" + encodeURIComponent(id), { method: "POST" });
    if (!res.ok) { toast(await res.text() || "Retry failed", true); return; }
    toast("Retrying…");
    pollTransfers();
  } catch { toast("Retry failed", true); }
}

function updateSendState() {
  const tgt = state.devices.find(d => d.id === state.target);
  const paired = tgt && state.pairedIds.has(tgt.id);
  $("#sendBtn").disabled = !(tgt && paired && state.staged.length);
  if (!tgt) {
    $("#dropHint").textContent = "Pick a device above first";
  } else if (!paired) {
    $("#dropHint").textContent = "Pair with " + tgt.name + " before sending";
  } else {
    $("#dropHint").textContent = "Sending to " + tgt.name;
  }
}

async function sendAll() {
  const tgt = state.devices.find(d => d.id === state.target);
  if (!tgt || !state.staged.length) return;
  // Re-check pairing state before sending.
  await refreshPairedStatus();
  if (!state.pairedIds.has(tgt.id)) {
    toast("Pair with " + tgt.name + " first", true);
    return;
  }
  const paths = state.staged.map(f => f.path);
  $("#sendBtn").disabled = true;
  try {
    const res = await apiFetch("/api/send-path", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ to: state.target, paths })
    });
    if (!res.ok) { toast(await res.text() || "Send failed", true); return; }
    state.staged = [];
    toast(`Sending ${paths.length} file${paths.length > 1 ? "s" : ""} to ${tgt.name}`);
    pollTransfers();
  } catch(e) { toast("Send failed: " + (e.message || ""), true); }
  finally { updateSendState(); }
}

async function pollTransfers() {
  try {
    const data = await (await apiFetch("/api/transfers")).json();
    const now = performance.now();
    for (const t of data) {
      const prev = rates[t.id];
      if (t.status === "sending" && prev && now > prev.t) {
        t.rate = (t.sent - prev.sent) / ((now - prev.t) / 1000);
      }
      rates[t.id] = { sent: t.sent, t: now };
    }
    state.transfers = data;
    renderQueue();
  } catch {}
}

async function addPeer() {
  const input = $("#hostInput");
  const host = input.value.trim();
  if (!host) return;
  const btn = $("#addBtn");
  btn.disabled = true;
  try {
    const res = await apiFetch("/api/peers/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ host })
    });
    if (!res.ok) { toast(await res.text() || "Could not add device", true); }
    else {
      const peer = await res.json();
      input.value = "";
      toast("Added " + peer.name);
      await pollDevices();
      state.target = peer.id; renderDevices(); updateSendState();
    }
  } catch { toast("Could not add device", true); }
  finally { btn.disabled = false; }
}

async function removePeer(id) {
  try {
    await apiFetch("/api/peers/remove", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
    if (state.target === id) state.target = null;
    await pollDevices();
  } catch {}
}

// ── Pairing ──
async function refreshPairedStatus() {
  for (const d of state.devices) {
    try {
      const r = await (await apiFetch("/api/pair/status?id=" + encodeURIComponent(d.id))).json();
      if (r.paired) state.pairedIds.add(d.id); else state.pairedIds.delete(d.id);
    } catch {}
  }
  renderDevices();
}

let pairTargetId = "";
let pairTargetName = "";

function openPairModal(deviceId, deviceName) {
  pairTargetId = deviceId;
  pairTargetName = deviceName;
  $("#pairDevName").textContent = deviceName;
  $("#pairStep1").style.display = "";
  $("#pairStep2").style.display = "none";
  $("#pairStep3").style.display = "none";
  $("#pairError").style.display = "none";
  $("#pinInput").value = "";
  $("#pairModal").classList.add("open");
}
function closePairModal() { clearInterval(pairPollTimer); pairPollTimer = null; $("#pairModal").classList.remove("open"); }

let pairPollTimer = null;
async function pairGenerate() {
  try {
    const r = await (await apiFetch("/api/pair/begin", { method: "POST" })).json();
    $("#pinDisplay").textContent = r.pin;
    $("#pairStep1").style.display = "none";
    $("#pairStep2").style.display = "";
    // Poll until the remote device enters the PIN and pairing completes.
    clearInterval(pairPollTimer);
    pairPollTimer = setInterval(async () => {
      try {
        const s = await (await apiFetch("/api/pair/status?id=" + encodeURIComponent(pairTargetId))).json();
        if (s.paired) {
          clearInterval(pairPollTimer); pairPollTimer = null;
          toast(`Paired with ${pairTargetName}!`);
          closePairModal();
          refreshPairedStatus();
        }
      } catch {}
    }, 2000);
  } catch { toast("Failed to start pairing", true); closePairModal(); }
}

function pairShowInput() {
  $("#pairStep1").style.display = "none";
  $("#pairStep3").style.display = "";
  setTimeout(() => $("#pinInput").focus(), 100);
}

async function pairSubmitPin() {
  const pin = $("#pinInput").value.trim();
  if (!pin || pin.length < 4) { $("#pairError").textContent = "Enter a valid PIN"; $("#pairError").style.display = ""; return; }
  try {
    const res = await apiFetch("/api/pair/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ device_id: pairTargetId, pin })
    });
    if (!res.ok) { $("#pairError").textContent = await res.text() || "Pairing failed"; $("#pairError").style.display = ""; return; }
    toast(`Paired with ${pairTargetName}!`);
    closePairModal();
    refreshPairedStatus();
  } catch { $("#pairError").textContent = "Pairing failed"; $("#pairError").style.display = ""; }
}

function startPairing(deviceId, deviceName) { openPairModal(deviceId, deviceName); }

async function unpairDevice(id) {
  try {
    await apiFetch("/api/pair/unpair?id=" + encodeURIComponent(id), { method: "POST" });
    state.pairedIds.delete(id);
    renderDevices();
    updateSendState();
    toast("Device unpaired");
  } catch { toast("Unpair failed", true); }
}

// Wiring
const drop = $("#drop");
$("#addBtn").addEventListener("click", addPeer);
$("#hostInput").addEventListener("keydown", e => { if (e.key === "Enter") addPeer(); });
// Clicking the drop zone opens the native file picker (Go returns real paths).
drop.addEventListener("click", pickFiles);
// Visual hover feedback while dragging over the window (the actual drop is
// captured natively by Go and delivered via window.swiftdropOnDrop).
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
$("#sendBtn").addEventListener("click", sendAll);
$("#clearBtn").addEventListener("click", async () => {
  state.staged = [];                                   // clear pending picks
  try { await apiFetch("/api/transfers/clear", { method: "POST" }); } catch {}  // clear finished (keeps ongoing)
  await pollTransfers();
  updateSendState();
});

$("#quitBtn").addEventListener("click", () => { apiFetch("/api/quit", { method: "POST" }); });

// Pairing modal wiring
$("#pairClose").addEventListener("click", closePairModal);
$("#pairModal").addEventListener("click", e => { if (e.target === $("#pairModal")) closePairModal(); });
$("#pairGenerate").addEventListener("click", pairGenerate);
$("#pairEnter").addEventListener("click", pairShowInput);
$("#pinSubmit").addEventListener("click", pairSubmitPin);
$("#pinInput").addEventListener("keydown", e => { if (e.key === "Enter") pairSubmitPin(); });

loadMe();
pollDevices();
pollTransfers();
setTimeout(refreshPairedStatus, 2000);
setInterval(loadMe, 4000);        // refresh own IP on network change
setInterval(pollDevices, 2000);
setInterval(pollTransfers, 700);
setInterval(refreshPairedStatus, 10000);

</script>
