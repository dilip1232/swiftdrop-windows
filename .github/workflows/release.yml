name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: swiftdrop-windows

      - uses: actions/checkout@v4
        with:
          repository: dilip1232/swiftdrop-core
          ref: dev
          path: swiftdrop-core

      - uses: actions/setup-go@v5
        with:
          go-version-file: swiftdrop-windows/go.mod

      - name: Build SwiftDrop.exe
        working-directory: swiftdrop-windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Rename with version
        working-directory: swiftdrop-windows
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          Copy-Item SwiftDrop.exe "SwiftDrop-Windows-$version.exe"

      - name: Get changelog from PR
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(gh pr list --base main --head "release/${VERSION}" --state merged --json body --jq '.[0].body' || echo "")
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: swiftdrop-windows/SwiftDrop-Windows-*.exe
