name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: swiftdrop-windows

      - uses: actions/checkout@v4
        with:
          repository: dilip1232/swiftdrop-core
          ref: main
          path: swiftdrop-core

      - uses: actions/setup-go@v5
        with:
          go-version-file: swiftdrop-windows/go.mod

      - name: Extract version
        id: version
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        working-directory: swiftdrop-windows
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Build SwiftDrop.exe
        working-directory: swiftdrop-windows
        run: go build -ldflags "-s -w -H windowsgui" -o SwiftDrop.exe .

      - name: Rename with version
        working-directory: swiftdrop-windows
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}" -replace '^v',''
          Copy-Item SwiftDrop.exe "SwiftDrop-Windows-$version.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          files: swiftdrop-windows/SwiftDrop-Windows-*.exe
